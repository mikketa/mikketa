<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" role="img" aria-label="mikketa — arch linux, hyprland, gruvbox">
  <style>
    text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      font-size: 15px;
    }
    .fg   { fill: #ebdbb2; }
    .key  { fill: #fabd2f; font-weight: 600; }
    .grn  { fill: #b8bb26; font-weight: 700; }
    .blu  { fill: #83a598; font-weight: 700; }
  </style>

  <rect x="0.5" y="0.5" width="759" height="399" rx="12" fill="#282828" stroke="#504945"/>

  <text x="32" y="52"><tspan class="grn">❯</tspan><tspan class="fg" dx="10">fastfetch</tspan></text>

  <text x="32" y="94"><tspan class="grn">mikketa</tspan><tspan class="fg">@</tspan><tspan class="blu">arch</tspan></text>
  <rect x="32" y="104" width="118" height="1" fill="#504945"/>

  <text class="key" x="32" y="134">os</text><text class="fg" x="160" y="134">arch linux</text>
  <text class="key" x="32" y="160">wm</text><text class="fg" x="160" y="160">hyprland (wayland)</text>
  <text class="key" x="32" y="186">terminal</text><text class="fg" x="160" y="186">alacritty</text>
  <text class="key" x="32" y="212">shell</text><text class="fg" x="160" y="212">zsh + starship</text>
  <text class="key" x="32" y="238">editor</text><text class="fg" x="160" y="238">neovim</text>
  <text class="key" x="32" y="264">theme</text><text class="fg" x="160" y="264">gruvbox, évidemment</text>
  <text class="key" x="32" y="290">code</text><text class="fg" x="160" y="290">rust · java · typescript</text>

  <g transform="translate(32, 312)">
    <rect x="0"   width="24" height="14" fill="#cc241d"/>
    <rect x="28"  width="24" height="14" fill="#d65d0e"/>
    <rect x="56"  width="24" height="14" fill="#d79921"/>
    <rect x="84"  width="24" height="14" fill="#98971a"/>
    <rect x="112" width="24" height="14" fill="#689d6a"/>
    <rect x="140" width="24" height="14" fill="#458588"/>
    <rect x="168" width="24" height="14" fill="#b16286"/>
    <rect x="196" width="24" height="14" fill="#a89984"/>
  </g>

  <text x="32" y="370" class="grn">❯</text>
  <rect x="52" y="356" width="9" height="18" fill="#ebdbb2">
    <animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.45;0.5;0.95;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
